<!DOCTYPE html>
<html lang="en" data-env="marginalia" data-font="literary" data-mode="personal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M. Suheer Baig</title>
<link rel="stylesheet" href="style.css">
<link id="font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=EB+Garamond:ital,wght@0,400;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
</head>
<body>

<div id="wipe"></div>

<div id="entry">
  <p class="entry-poem">there's no map for this, thank you &amp; thank you</p>
  <div class="entry-doors">
    <button class="door" data-mode="personal">
      <span class="door-label">for the reader</span>
      <span class="door-name">Personal</span>
    </button>
    <button class="door" data-mode="professional">
      <span class="door-label">for the client</span>
      <span class="door-name">Professional</span>
    </button>
  </div>
</div>

<nav id="nav" hidden>
  <a href="#home" id="nav-logo" class="logo">M. Suheer Baig</a>
  <ul id="nav-links"></ul>
  <button id="settings-btn" aria-label="Settings" title="Settings">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="8" cy="8" r="2.5"/>
      <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
    </svg>
  </button>
</nav>

<main id="app"></main>

<div id="switcher" hidden>
  <div id="switcher-track"></div>
  <button id="switcher-back" aria-label="Previous environments">‹</button>
  <button id="switcher-fwd" aria-label="Next environments">›</button>
</div>

<div id="settings-panel" hidden>
  <div id="settings-inner">
    <div class="settings-header">
      <span class="settings-title">Preferences</span>
      <button id="settings-close" aria-label="Close">×</button>
    </div>
    <div class="settings-section">
      <p class="settings-label">Font</p>
      <div class="settings-options" id="font-options"></div>
    </div>
    <div class="settings-section">
      <p class="settings-label">Text size</p>
      <div class="settings-options" id="size-options">
        <button class="opt-btn" data-action="size" data-val="small">A<sub>s</sub></button>
        <button class="opt-btn on" data-action="size" data-val="medium">A</button>
        <button class="opt-btn" data-action="size" data-val="large">A<sup>+</sup></button>
      </div>
    </div>
    <div class="settings-section">
      <p class="settings-label">Accessibility</p>
      <div class="settings-options col" id="a11y-options">
        <button class="opt-btn toggle" data-action="a11y" data-val="high-contrast">High contrast</button>
        <button class="opt-btn toggle" data-action="a11y" data-val="no-motion">Reduce motion</button>
        <button class="opt-btn toggle" data-action="a11y" data-val="dyslexia">Dyslexia mode</button>
        <button class="opt-btn toggle" data-action="a11y" data-val="underline-links">Underline links</button>
      </div>
    </div>
    <div class="settings-footer">
      <button class="opt-btn" id="switch-side-btn"></button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
